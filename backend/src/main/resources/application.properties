spring.application.name=skillforge-backend
server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/skillforge_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:skillforge}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${APP_JWT_SECRET:RGV2T25seVNraWxsRm9yZ2VKd3RTZWNyZXRLZXlGb3JMb2NhbFVzZQ==}
app.jwt.expiration-ms=86400000
